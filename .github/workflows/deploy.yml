name: Deploy to IHC

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Pack out folder
        run: tar -cf site.tar -C out .

      - name: Upload archive to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "site.tar"
          target: ${{ secrets.TARGET_PATH }}

      - name: Unpack on server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            cd ${{ secrets.TARGET_PATH }}
            find . -mindepth 1 -maxdepth 1 ! -name '.well-known' ! -name 'site.tar' -exec rm -rf {} +
            tar -xf site.tar
            rm -f site.tar
            ls -la